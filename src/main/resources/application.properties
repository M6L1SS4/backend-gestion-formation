spring.application.name=backend-gestion-formation
spring.datasource.url=jdbc:mysql://localhost:3306/gestion-formation?createDatabaseIfNotExist=true&useSSL=false&useUnicode=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
